services:
  tunnel-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tunnel-manager
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/data/tunnel-manager.db
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SESSION_SECRET: ${SESSION_SECRET}
      PORT: "3000"
      SYNC_INTERVAL_MS: ${SYNC_INTERVAL_MS:-60000}
      CF_MAX_RETRIES: ${CF_MAX_RETRIES:-3}
      CF_RETRY_BASE_DELAY_MS: ${CF_RETRY_BASE_DELAY_MS:-500}
    volumes:
      - tunnel-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
  cloudflare-selfhost:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-selfhost
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      CLOUDFLARE_TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - tunnel-manager
    

volumes:
  tunnel-data:
    driver: local
